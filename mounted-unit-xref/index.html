<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mounted Unit X-Ref</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="page">
  <section class="hero">
    <h1>Mounted Unit X-Ref</h1>
    <p>Search direct table interchanges across AMI, Browning, Dodge, FYH, Hub City, INA, IPTCI, Link-Belt, MB, MRC/SKF, NTN, Sealmaster and Timken.</p>
  </section>

  <section class="controls">
    <input id="search" type="search" placeholder="Search any part number, e.g. P2B-SC-100, NP-16, UCP205-16" />
    <select id="brand">
      <option value="">All brands</option>
    </select>
    <select id="section">
      <option value="">All unit types</option>
    </select>
    <button id="clearBtn" type="button">Clear</button>
  </section>

  <p id="resultCount" class="status"></p>

  <main id="results"></main>

  <div class="footer">Designed and built by H. Fitzgerald</div>
</div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
