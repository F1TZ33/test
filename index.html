<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Module Launcher</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#111;
    color:#fff;
}

.page{
    max-width:1400px;
    margin:0 auto;
    padding:24px;
}

.hero{
    background:#181818;
    border:1px solid #c40000;
    border-radius:14px;
    padding:20px;
    margin-bottom:24px;
    box-shadow:0 0 12px rgba(196,0,0,0.35);
}

.hero h1{
    margin:0 0 8px;
    font-size:32px;
}

.hero p{
    margin:0;
    color:#bbb;
}

.topbar{
    display:flex;
    gap:12px;
    margin-bottom:18px;
    flex-wrap:wrap;
}

input{
    flex:1;
    min-width:240px;
    padding:12px;
    border-radius:10px;
    border:1px solid #444;
    background:#181818;
    color:#fff;
    font-size:15px;
}

button{
    padding:12px 18px;
    border-radius:10px;
    border:1px solid #c40000;
    background:#111;
    color:#fff;
    font-weight:bold;
    cursor:pointer;
    box-shadow:0 3px 0 #7a0000;
}

button:hover{
    background:#1b1b1b;
}

.status{
    color:#aaa;
    font-size:13px;
    margin-bottom:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
    gap:18px;
}

.tile{
    background:#181818;
    border:1px solid #333;
    border-radius:14px;
    padding:18px;
    transition:0.2s;
}

.tile:hover{
    border-color:#c40000;
    transform:translateY(-2px);
}

.tile h3{
    margin-top:0;
    color:#fff;
}

.tile p{
    color:#aaa;
    font-size:14px;
    min-height:38px;
}

.tile a{
    display:inline-block;
    margin-top:12px;
    padding:10px 14px;
    border-radius:8px;
    border:1px solid #c40000;
    text-decoration:none;
    color:#fff;
    font-size:14px;
}

.tile a:hover{
    background:#c40000;
}

.empty{
    border:1px dashed #555;
    border-radius:14px;
    padding:22px;
    color:#aaa;
    background:#181818;
}

.footer{
    text-align:center;
    margin-top:40px;
    color:#666;
    font-size:12px;
}

@media(max-width:700px){
    .topbar{
        flex-direction:column;
    }

    button{
        width:100%;
    }
}
</style>
</head>

<body>

<div class="page">

    <section class="hero">
        <h1>Module Launcher</h1>
        <p>Live launcher for HTML files currently present in this GitHub source folder.</p>
    </section>

    <div class="topbar">
        <input type="text" id="search" placeholder="Search modules...">
        <button onclick="loadDirectory()">Refresh Directory</button>
    </div>

    <div class="status" id="status">Loading directory...</div>

    <div class="grid" id="moduleGrid"></div>

    <div class="footer">
        Designed and built by H. Fitzgerald
    </div>

</div>

<script>
let modules = [];

/*
  IMPORTANT:
  Static GitHub Pages cannot read a folder directly from the browser file system.
  This page uses the public GitHub API to list files in the current repo folder.

  Works best when hosted from GitHub Pages:
  https://username.github.io/repository-name/folder/index.html
*/

function titleFromFile(filename){
    return filename
        .replace(/\.html$/i, "")
        .replace(/[-_]+/g, " ")
        .replace(/\b\w/g, char => char.toUpperCase());
}

function getRepoInfoFromUrl(){
    const hostParts = window.location.hostname.split(".");
    const pathParts = window.location.pathname.split("/").filter(Boolean);

    if (!window.location.hostname.includes("github.io") || pathParts.length === 0) {
        return null;
    }

    const owner = hostParts[0];
    const repo = pathParts[0];

    let sourcePathParts = pathParts.slice(1);

    if (sourcePathParts.length && sourcePathParts[sourcePathParts.length - 1].toLowerCase().endsWith(".html")) {
        sourcePathParts.pop();
    }

    const sourcePath = sourcePathParts.join("/");

    return { owner, repo, sourcePath };
}

async function loadDirectory(){
    const status = document.getElementById("status");
    const grid = document.getElementById("moduleGrid");

    status.textContent = "Refreshing directory...";
    grid.innerHTML = "";

    const repoInfo = getRepoInfoFromUrl();

    if (!repoInfo) {
        status.textContent = "Live directory detection works when this file is hosted on GitHub Pages. For local testing, upload to the repo first.";
        modules = [];
        renderModules(modules);
        return;
    }

    const apiUrl = `https://api.github.com/repos/${repoInfo.owner}/${repoInfo.repo}/contents/${repoInfo.sourcePath}?t=${Date.now()}`;

    try {
        const response = await fetch(apiUrl, { cache: "no-store" });

        if (!response.ok) {
            throw new Error("GitHub API request failed.");
        }

        const contents = await response.json();

        modules = contents
            .filter(item =>
                item.type === "file" &&
                item.name.toLowerCase().endsWith(".html") &&
                item.name.toLowerCase() !== "index.html"
            )
            .map(item => ({
                title: titleFromFile(item.name),
                file: item.name,
                description: "HTML module detected in source folder."
            }))
            .sort((a, b) => a.title.localeCompare(b.title));

        status.textContent = `${modules.length} module(s) detected in this source folder.`;
        renderModules(modules);

    } catch (error) {
        console.error(error);
        status.textContent = "Could not load live directory. Check that the repo is public or use a generated manifest for private repos.";
        modules = [];
        renderModules(modules);
    }
}

function renderModules(list){
    const grid = document.getElementById("moduleGrid");
    grid.innerHTML = "";

    if (!list.length) {
        grid.innerHTML = `
            <div class="empty">
                No HTML modules detected yet.
            </div>
        `;
        return;
    }

    list.forEach(module => {
        const tile = document.createElement("div");
        tile.className = "tile";

        tile.innerHTML = `
            <h3>${module.title}</h3>
            <p>${module.description}</p>
            <a href="${module.file}">Open Module</a>
        `;

        grid.appendChild(tile);
    });
}

document.getElementById("search").addEventListener("input", function(){
    const term = this.value.toLowerCase();

    const filtered = modules.filter(module =>
        module.title.toLowerCase().includes(term) ||
        module.file.toLowerCase().includes(term)
    );

    renderModules(filtered);
});

loadDirectory();
</script>

</body>
</html>
