<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Module Launcher</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#111;
    color:#fff;
}

.page{
    max-width:1400px;
    margin:0 auto;
    padding:24px;
}

.hero{
    background:#181818;
    border:1px solid #c40000;
    border-radius:14px;
    padding:20px;
    margin-bottom:24px;
    box-shadow:0 0 12px rgba(196,0,0,0.35);
}

.hero h1{
    margin:0 0 8px;
    font-size:32px;
}

.hero p{
    margin:0;
    color:#bbb;
}

.topbar{
    display:flex;
    gap:12px;
    margin-bottom:24px;
    flex-wrap:wrap;
}

input{
    flex:1;
    min-width:240px;
    padding:12px;
    border-radius:10px;
    border:1px solid #444;
    background:#181818;
    color:#fff;
    font-size:15px;
}

button{
    padding:12px 18px;
    border-radius:10px;
    border:1px solid #c40000;
    background:#111;
    color:#fff;
    font-weight:bold;
    cursor:pointer;
    box-shadow:0 3px 0 #7a0000;
}

button:hover{
    background:#1b1b1b;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
    gap:18px;
}

.tile{
    background:#181818;
    border:1px solid #333;
    border-radius:14px;
    padding:18px;
    transition:0.2s;
}

.tile:hover{
    border-color:#c40000;
    transform:translateY(-2px);
}

.tile h3{
    margin-top:0;
    color:#fff;
}

.tile p{
    color:#aaa;
    font-size:14px;
    min-height:40px;
}

.tile a{
    display:inline-block;
    margin-top:12px;
    padding:10px 14px;
    border-radius:8px;
    border:1px solid #c40000;
    text-decoration:none;
    color:#fff;
    font-size:14px;
}

.tile a:hover{
    background:#c40000;
}

.footer{
    text-align:center;
    margin-top:40px;
    color:#666;
    font-size:12px;
}

@media(max-width:700px){
    .topbar{
        flex-direction:column;
    }

    button{
        width:100%;
    }
}
</style>
</head>

<body>

<div class="page">

    <section class="hero">
        <h1>Module Launcher</h1>
        <p>Dynamic launcher for BW Playbook modules and tools.</p>
    </section>

    <div class="topbar">
        <input type="text" id="search" placeholder="Search modules...">
        <button onclick="loadModules()">Refresh Directory</button>
    </div>

    <div class="grid" id="moduleGrid"></div>

    <div class="footer">
        Designed and built by H. Fitzgerald
    </div>

</div>

<script>

let modules = [];

async function loadModules() {

    const response = await fetch('manifest.json?t=' + new Date().getTime());
    modules = await response.json();

    renderModules(modules);
}

function renderModules(list){

    const grid = document.getElementById('moduleGrid');
    grid.innerHTML = '';

    list.forEach(module => {

        const tile = document.createElement('div');
        tile.className = 'tile';

        tile.innerHTML = `
            <h3>${module.title}</h3>
            <p>${module.description || 'No description provided.'}</p>
            <a href="${module.file}">Open Module</a>
        `;

        grid.appendChild(tile);

    });
}

document.getElementById('search').addEventListener('input', function(){

    const term = this.value.toLowerCase();

    const filtered = modules.filter(module =>
        module.title.toLowerCase().includes(term)
    );

    renderModules(filtered);

});

loadModules();

</script>

</body>
</html>
