<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Auto X Ref Dimensional Search</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="shell compact-shell">
    <section id="dimPanel" class="controls panel dim-panel">
      <div class="dim-title-row compact-title">
        <div>
          <h2>Dimensional Search</h2>
          <p>Search by part/reference text from any point, or by ID × OD × width. Split widths are matched both ways.</p>
        </div>
      </div>

      <div class="dim-grid reference-grid compact-grid">
        <div class="search-wrap part-expression">
          <label for="partQuery">Quick reference / part number</label>
          <input id="partQuery" type="search" placeholder="enter text starting from any point" autocomplete="off" />
        </div>
        <div class="search-wrap">
          <label for="dimId">ID / d</label>
          <input id="dimId" type="number" step="any" placeholder="35" />
        </div>
        <div class="search-wrap">
          <label for="dimOd">OD / D</label>
          <input id="dimOd" type="number" step="any" placeholder="72" />
        </div>
        <div class="search-wrap">
          <label for="dimW1">Width 1</label>
          <input id="dimW1" type="number" step="any" placeholder="14" />
        </div>
        <div class="search-wrap">
          <label for="dimW2">Width 2 optional</label>
          <input id="dimW2" type="number" step="any" placeholder="17" />
        </div>
        <div class="search-wrap tolerance-field">
          <label for="dimTol">Tolerance ± mm</label>
          <input id="dimTol" type="number" step="any" value="0" min="0" />
        </div>
      </div>

      <div class="control-row compact-actions">
        <button id="clearDimBtn" type="button">Clear search</button>
        <span id="dimStats" class="stats-inline"></span>
      </div>
      <div id="dimResults"></div>
    </section>
  </main>
  <footer>Designed and built by H. Fitzgerald</footer>
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
